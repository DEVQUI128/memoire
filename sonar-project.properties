# =============================================
# Configuration SonarQube pour 📝 Notes
# =============================================

# Identification du projet
sonar.projectKey=notes-secure
sonar.projectName=📝 Notes - Application DevSecOps
sonar.projectVersion=1.0

# Description
sonar.projectDescription=Application Flask sécurisée avec analyse SonarQube SAST

# =============================================
# Source et Inclusion/Exclusion
# =============================================

# Fichiers source
sonar.sources=app,config.py,run.py
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/.venv/**,**/__pycache__/**,**/*.pyc,**/instance/**,**/*.db,**/test_*.py,**/*_test.py,**/tests/**

# =============================================
# Configuration Python
# =============================================

# Version Python
sonar.language=py
sonar.python.version=3.13

# =============================================
# Sécurité et Vulnerabilités
# =============================================

# Profil de qualité (sécurité)
sonar.qualityProfile=Sonar Security way

# Activation des règles de sécurité
sonar.security.sources=true

# =============================================
# Connexion au serveur SonarQube
# =============================================

# URL du serveur SonarQube local
# sonar.host.url=http://localhost:9000

# Authentification (à remplir avec vos credentials)
# sonar.login=your-token
# sonar.password=

# =============================================
# Rapports et Artefacts
# =============================================

# Dossier de travail
sonar.working.directory=.sonar

# Rapports de couverture (optionnel)
# sonar.coverage.reportPaths=coverage.xml
# sonar.python.coverage.reportPaths=coverage.xml

# =============================================
# Règles personnalisées
# =============================================

# Ignorer certaines règles sur certains fichiers
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=*
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/__init__.py
